<section class="education" aria-labelledby="education-title">
  <header class="section-header">
    <h2 id="education-title" class="section-title">Education</h2>
    <div class="section-line"></div>
  </header>

  <div class="education__timeline">
    @for (item of educationItems; track item.degree) {
      <div class="education__item">
        <div class="education__dot"></div>
        <div class="education__content">
          <span class="education__period">{{ item.period }}</span>
          <h3 class="education__degree">{{ item.degree }}</h3>
          <h4 class="education__institution">{{ item.institution }}</h4>
          <p class="education__description">{{ item.description }}</p>
        </div>
      </div>
    }
  </div>
</section>
