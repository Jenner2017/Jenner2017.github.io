<section class="experience" aria-labelledby="experience-title">
  <header class="section-header">
    <h2 id="experience-title" class="section-title">Experience</h2>
    <div class="section-line"></div>
  </header>

  <div class="experience__timeline">
    @for (exp of experiences; track exp.role) {
      <div class="experience__item">
        <div class="experience__dot"></div>
        <div class="experience__content">
          <span class="experience__period">{{ exp.period }}</span>
          <h3 class="experience__role">{{ exp.role }}</h3>
          <h4 class="experience__company">{{ exp.company }}</h4>
          <p class="experience__description">{{ exp.description }}</p>
        </div>
      </div>
    }
  </div>
</section>
